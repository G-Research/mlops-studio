<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="geGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6310"/>
      <stop offset="100%" style="stop-color:#f1a981"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#geGradient)" stroke="#404041" stroke-width="4"/>
  
  <!-- GE monogram -->
  <g transform="translate(100,100)">
    <!-- G -->
    <path d="M-35,-20 A20,20 0 1,0 -35,20 L-15,20 L-15,0 L-25,0" fill="white" stroke="#404041" stroke-width="1.5"/>
    <!-- E -->
    <path d="M5,-20 L5,20 M5,-20 L25,-20 M5,0 L20,0 M5,20 L25,20" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Data quality indicator dots -->
  <circle cx="60" cy="60" r="4" fill="white" opacity="0.8"/>
  <circle cx="140" cy="60" r="4" fill="white" opacity="0.8"/>
  <circle cx="60" cy="140" r="4" fill="white" opacity="0.8"/>
  <circle cx="140" cy="140" r="4" fill="white" opacity="0.8"/>
</svg>