<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Pipeline connection line -->
  <line x1="10" y1="10" x2="22" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Stage nodes: brightest = start, fading = progression -->
  <circle cx="10" cy="10" r="4.5" fill="white"/>
  <circle cx="16" cy="16" r="4" fill="white" opacity="0.7"/>
  <circle cx="22" cy="22" r="3.5" fill="white" opacity="0.45"/>
</svg>
